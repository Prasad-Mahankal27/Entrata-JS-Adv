<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced JS Concept Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="register-view" class="container">
        <h2>Register Account</h2>
        <div id="reg-msg"></div>
        <form id="register-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="text" id="reg-email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-pass" required>
            </div>
            <button type="submit">Create Account</button>
        </form>
        <span class="nav-link" onclick="toggleView('login-view')">Already have an account? Login</span>
    </div>

    <div id="login-view" class="container hidden">
        <h2>Login</h2>
        <div id="login-msg"></div>
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="text" id="login-email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-pass" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
        <span class="nav-link" onclick="toggleView('register-view')">New here? Register</span>
    </div>

    <div id="dashboard-view" class="container dashboard-container hidden">
        <div class="dashboard-header">
            <div>
                <h2 id="welcome-text">Welcome</h2>
                <p id="current-time"></p>
            </div>
            <button onclick="logout()" style="width: auto; padding: 0.5rem 1rem;">Logout</button>
        </div>

        <div class="widget">
            <h3>Budget Calculator</h3>
            <div class="form-group">
                <label>Monthly Income ($)</label>
                <input type="number" id="income" value="5000">
            </div>
            <div class="form-group">
                <label>Expenses ($)</label>
                <input type="number" id="expenses" value="3000">
            </div>
            <button onclick="calculateBudget()">Estimate Savings</button>
            <p id="budget-result" style="margin-top: 1rem; font-weight: bold;"></p>
        </div>

        <div class="widget">
            <h3>Recent Activity</h3>
            <ul id="task-list" class="task-list"></ul>
        </div>

        <div class="widget">
            <h3>System Information</h3>
            <p id="browser-info"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
